<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the local subsetted IntraNet so it's in flight in parallel
         with HTML parsing instead of waiting for CSS to be parsed. -->
    <link
      rel="preload"
      href="/fonts/IntraNet.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Single static 400-weight Source Code Pro. The hover "thicker" effect
         is faked via text-shadow stamps so we don't actually need the
         variable wght axis or a heavier weight. ~70% smaller than the
         full-axis variable file. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap"
      rel="stylesheet"
    />
    <!-- 42dot Sans (400/500/700) — body copy + step display headings.
         Geometric contemporary sans with a squared, slightly tech feel.
         Free Google Font. Replaced Source Code Pro for body copy, and
         Mirano Extended Light upright for the step display intros. -->
    <link
      href="https://fonts.googleapis.com/css2?family=42dot+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>BAS STUDIO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
