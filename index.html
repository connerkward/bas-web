<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the local subsetted IntraNet so it's in flight in parallel
         with HTML parsing instead of waiting for CSS to be parsed. -->
    <link
      rel="preload"
      href="/fonts/IntraNet.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Single static 400-weight Source Code Pro. The hover "thicker" effect
         is faked via text-shadow stamps so we don't actually need the
         variable wght axis or a heavier weight. ~70% smaller than the
         full-axis variable file. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap"
      rel="stylesheet"
    />
    <!-- 42dot Sans (400/500/700) — body copy + step display headings.
         Geometric contemporary sans with a squared, slightly tech feel.
         Free Google Font. Replaced Source Code Pro for body copy, and
         Mirano Extended Light upright for the step display intros. -->
    <link
      href="https://fonts.googleapis.com/css2?family=42dot+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>BAS STUDIO — CNC Sculpture, Fabrication & Realtime Media</title>
    <meta
      name="description"
      content="BAS STUDIO designs, builds, and deploys physical work: CNC sculpture, CAM fabrication, projection mapping, and realtime TouchDesigner media. A studio by Conner Ward."
    />
    <link rel="canonical" href="https://bas.run/" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="Conner Ward" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BAS STUDIO" />
    <meta property="og:title" content="BAS STUDIO — CNC Sculpture, Fabrication & Realtime Media" />
    <meta
      property="og:description"
      content="BAS STUDIO designs, builds, and deploys physical work: CNC sculpture, CAM fabrication, projection mapping, and realtime TouchDesigner media. A studio by Conner Ward."
    />
    <meta property="og:url" content="https://bas.run/" />
    <meta property="og:image" content="https://bas.run/favicon.png" />
    <meta property="og:image:width" content="256" />
    <meta property="og:image:height" content="256" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BAS STUDIO — CNC Sculpture, Fabrication & Realtime Media" />
    <meta
      name="twitter:description"
      content="BAS STUDIO designs, builds, and deploys physical work: CNC sculpture, CAM fabrication, projection mapping, and realtime TouchDesigner media. A studio by Conner Ward."
    />
    <meta name="twitter:image" content="https://bas.run/favicon.png" />

    <!-- Structured data: Organization (BAS STUDIO) + Person (Conner Ward) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://bas.run/#organization",
            "name": "BAS STUDIO",
            "url": "https://bas.run/",
            "logo": "https://bas.run/favicon.png",
            "description": "A studio that designs, builds, and deploys physical work: CNC sculpture, CAM fabrication, projection mapping, and realtime TouchDesigner media.",
            "slogan": "Design — Build — Deploy",
            "knowsAbout": [
              "CNC",
              "Fusion 360",
              "ShopBot",
              "TouchDesigner",
              "Blender",
              "Projection Mapping",
              "Stream Diffusion"
            ],
            "sameAs": [
              "https://www.instagram.com/bas.runn/",
              "https://github.com/connerkward/bas"
            ],
            "founder": { "@id": "https://connerkward.dev/#person" }
          },
          {
            "@type": "Person",
            "@id": "https://connerkward.dev/#person",
            "name": "Conner Ward",
            "url": "https://connerkward.dev",
            "jobTitle": "Creative Technologist",
            "description": "Creative technologist building physical realtime AI interaction systems, working across hybrid AI, fabrication, and vehicle UX research.",
            "email": "mailto:conner.k.ward@gmail.com",
            "sameAs": [
              "https://github.com/connerkward",
              "https://www.instagram.com/future_hindsight/"
            ],
            "worksFor": { "@id": "https://bas.run/#organization" }
          }
        ]
      }
    </script>

  </head>

</html>
